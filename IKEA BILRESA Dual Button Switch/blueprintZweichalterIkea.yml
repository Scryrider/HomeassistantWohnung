blueprint:
  name: BILRESA Dual Button - Adaptives Licht
  description: >
    Zwei-Tasten-Schalter: Taste 1 kurz = Licht an (adaptiv nach Tageszeit, 90%),
    Taste 2 kurz = Licht aus, Taste 1 lang = Szene aufrufen.
    Funktioniert mit Matter event.-Entitäten.
  domain: automation
  input:
    taste1_entity:
      name: Taste 1 Entität
      description: event.-Entität der ersten Taste
      selector:
        entity:
          domain: event
    taste2_entity:
      name: Taste 2 Entität
      description: event.-Entität der zweiten Taste
      selector:
        entity:
          domain: event
    licht_entity:
      name: Lampe
      description: Die zu steuernde Lampe
      selector:
        entity:
          domain: light
    szene_entity:
      name: Szene
      description: Szene die bei langem Drücken aufgerufen wird
      selector:
        entity:
          domain: scene
    rgb_morgen:
      name: RGB Farbe Morgen (06-09 Uhr)
      description: RGB-Wert für Morgenstunden
      default: [255, 209, 163]
      selector:
        color_rgb:
    rgb_tag:
      name: RGB Farbe Tag (09-17 Uhr)
      description: RGB-Wert für Tagstunden
      default: [255, 228, 205]
      selector:
        color_rgb:
    rgb_abend:
      name: RGB Farbe Abend (17-21 Uhr)
      description: RGB-Wert für Abendstunden
      default: [255, 180, 107]
      selector:
        color_rgb:
    rgb_nacht:
      name: RGB Farbe Nacht (21-06 Uhr)
      description: RGB-Wert für Nachtstunden
      default: [255, 147, 41]
      selector:
        color_rgb:
    helligkeit:
      name: Helligkeit
      description: Helligkeit in Prozent
      default: 90
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

trigger:
  - platform: state
    entity_id: !input taste1_entity
    id: taste1
  - platform: state
    entity_id: !input taste2_entity
    id: taste2

action:
  - variables:
      rgb_morgen: !input rgb_morgen
      rgb_tag: !input rgb_tag
      rgb_abend: !input rgb_abend
      rgb_nacht: !input rgb_nacht
      helligkeit: !input helligkeit
      rgb_wert: >-
        {% set h = now().hour %}
        {% if h >= 6 and h < 9 %}
          {{ rgb_morgen }}
        {% elif h >= 9 and h < 17 %}
          {{ rgb_tag }}
        {% elif h >= 17 and h < 21 %}
          {{ rgb_abend }}
        {% else %}
          {{ rgb_nacht }}
        {% endif %}
  - choose:
      - conditions:
          - condition: trigger
            id: taste1
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'multi_press_1' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input licht_entity
            data:
              brightness_pct: "{{ helligkeit }}"
              rgb_color: "{{ rgb_wert }}"
      - conditions:
          - condition: trigger
            id: taste2
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'multi_press_1' }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input licht_entity
      - conditions:
          - condition: trigger
            id: taste1
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'long_release' }}"
        sequence:
          - service: scene.turn_on
            target:
              entity_id: !input szene_entity
mode: single